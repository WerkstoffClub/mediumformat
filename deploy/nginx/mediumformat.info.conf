# ==========================================================================
# Medium Format — nginx server block for mediumformat.info
# Static prototype site. Place at /etc/nginx/sites-available/mediumformat.info
# then: ln -s ../sites-available/mediumformat.info /etc/nginx/sites-enabled/
# TLS is provisioned by certbot (see deploy/README.md).
# ==========================================================================

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name mediumformat.info www.mediumformat.info;

    # Allow ACME http-01 challenge for certbot
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS: serve the site ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mediumformat.info www.mediumformat.info;

    root /var/www/mediumformat.info;
    index index.html;

    # TLS (paths created by certbot --nginx or certbot certonly)
    ssl_certificate     /etc/letsencrypt/live/mediumformat.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediumformat.info/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Redirect www -> apex
    if ($host = www.mediumformat.info) { return 301 https://mediumformat.info$request_uri; }

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # NOTE: the prototype uses inline <style>/<script>, so 'unsafe-inline' is required here.
    # For the real app, replace with a nonce-based CSP (see DESIGN/security notes).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # --- Caching ---
    location = /favicon.svg { access_log off; expires 7d; }
    location ~* \.(svg|png|ico|webmanifest|xml|txt)$ { expires 7d; add_header Cache-Control "public"; }
    # HTML: always revalidate (prototype changes often)
    location ~* \.html$ { add_header Cache-Control "no-cache"; }

    # Pretty URLs: /mockup-cart resolves to mockup-cart.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
