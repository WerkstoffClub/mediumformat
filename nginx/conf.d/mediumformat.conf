# HTTP -> HTTPS redirect for mediumformat.info + www + mail subdomain.
# Admin lives at https://mediumformat.info/admin (no separate subdomain).
# ACME challenge served from /var/www/certbot for Let's Encrypt renewals.

server {
  listen 80;
  server_name mediumformat.info www.mediumformat.info mail.mediumformat.info;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# www -> apex canonical redirect.
server {
  listen 443 ssl;
  http2 on;
  server_name www.mediumformat.info;

  ssl_certificate /etc/letsencrypt/live/mediumformat.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mediumformat.info/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://mediumformat.info$request_uri;
}

# Public site + admin (same Next.js app) on the apex.
server {
  listen 443 ssl;
  http2 on;
  server_name mediumformat.info;

  ssl_certificate /etc/letsencrypt/live/mediumformat.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mediumformat.info/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options SAMEORIGIN;
  add_header Referrer-Policy strict-origin-when-cross-origin;

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# Listmonk newsletter admin (subdomain).
server {
  listen 443 ssl;
  http2 on;
  server_name mail.mediumformat.info;

  ssl_certificate /etc/letsencrypt/live/mediumformat.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mediumformat.info/privkey.pem;

  location / {
    proxy_pass http://listmonk:9000;
  }
}
